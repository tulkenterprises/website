<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      font-family: 'DM Sans', sans-serif;
      background: #0a1f2e;
      color: #d6edf5;
      -webkit-font-smoothing: antialiased;
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 2.5rem;
    }

    .logo svg { width: 44px; height: 44px; }

    .logo-name {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(1.25rem, 3vw, 1.75rem);
      font-style: italic;
      color: #d6edf5;
      letter-spacing: -0.01em;
    }

    .logo-name span { color: #38b6d9; font-style: normal; }

    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(2.5rem, 7vw, 5.5rem);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 1.25rem;
      color: #ffffff;
    }

    h1 em { color: #38b6d9; }

    p {
      font-size: clamp(1rem, 2vw, 1.2rem);
      color: #7aacbe;
      max-width: 40ch;
      line-height: 1.6;
    }

    footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.8rem;
      color: #2d5a6e;
      letter-spacing: 0.04em;
    }
  </style>
</head>

  <div class="logo">
    <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <circle cx="22" cy="22" r="21" fill="rgba(56,182,217,0.1)"/>
      <path d="M22 9 C22 9, 33 21, 33 27 A11 11 0 0 1 11 27 C11 21, 22 9, 22 9Z" fill="#38b6d9"/>
      <path d="M14 27 Q18 23.5, 22 26 Q26 28.5, 30 25" stroke="white" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.6"/>
